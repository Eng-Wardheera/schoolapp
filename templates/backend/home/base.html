    <script>
        $(document).ready(function() {
            var i = 1;
            $("#add_row").click(function() {
                b = i - 1;
                $("#addr" + i)
                    .html($("#addr" + b).html())
                    .find("td:first-child")
                    .html(i + 1);
                $("#tab_logic").append('<tr id="addr' + (i + 1) + '"></tr>');
                i++;
            });
            $("#delete_row").click(function() {
                if (i > 1) {
                    $("#addr" + (i - 1)).html("");
                    i--;
                }
                calc();
            });
            $("#tab_logic tbody").on("keyup change", function() {
                calc();
            });
            $("#tax").on("keyup change", function() {
                calc_total();
            });
        });

        function calc() {
            $("#tab_logic tbody tr").each(function(i, element) {
                var html = $(this).html();
                if (html != "") {
                    var qty = $(this).find(".qty").val();
                    var price = $(this).find(".price").val();
                    $(this)
                        .find(".total")
                        .val(qty * price);
                    calc_total();
                }
            });
        }

        function calc_total() {
            total = 0;
            $(".total").each(function() {
                total += parseInt($(this).val());
            });
            $("#sub_total").val(total.toFixed(2));
            tax_sum = (total / 100) * $("#tax").val();
            $("#tax_amount").val(tax_sum.toFixed(2));
            $("#total_amount").val((tax_sum + total).toFixed(2));
        }
    </script>

    <!-- SweetAlert2 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  (function () {
    let heartbeatIntervalUser;

    // 🔥 Get CSRF token from meta tag
    function getCSRFToken() {
      const meta = document.querySelector('meta[name="csrf-token"]');
      return meta ? meta.getAttribute("content") : null;
    }

    async function sendUserHeartbeat() {
      try {
        const csrfToken = getCSRFToken();

        const res = await fetch("/api/heartbeat", {
          method: "POST",
          credentials: "include", // ✅ send cookies
          headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": csrfToken   // 🔥 FIX: send CSRF token
          }
        });

        const contentType = res.headers.get("content-type");

        // ❌ Handle non-JSON (like errors)
        if (!contentType || !contentType.includes("application/json")) {
          const text = await res.text();
          console.error("❌ Non-JSON response:", text);
          return;
        }

        const data = await res.json();

        if (!res.ok) {
          console.error("❌ Server error:", data);
          return;
        }

        console.log("✅ Heartbeat:", data);

      } catch (err) {
        console.error("❌ Heartbeat error:", err);
      }
    }

    function startUserHeartbeat() {
      if (!heartbeatIntervalUser) {
        sendUserHeartbeat();
        heartbeatIntervalUser = setInterval(sendUserHeartbeat, 15000); // 15s
      }
    }

    function stopUserHeartbeat() {
      if (heartbeatIntervalUser) {
        clearInterval(heartbeatIntervalUser);
        heartbeatIntervalUser = null;
        console.log("⛔️ Heartbeat stopped (tab hidden)");
      }
    }

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        console.log("🟢 Tab visible");
        startUserHeartbeat();

        if (typeof updateSingleUserStatus === "function") {
          updateSingleUserStatus({{ user.id }});
        }

      } else {
        console.log("🔴 Tab hidden");
        stopUserHeartbeat();
      }
    });

    // Start immediately if tab is visible
    if (document.visibilityState === "visible") {
      startUserHeartbeat();
    }
  })();
</script>



<!-- Flash message handling with SweetAlert2 -->
<script>
   // Flash message handling with SweetAlert2
   const flashMessages = {{ get_flashed_messages(with_categories=True) | tojson | safe }};
   
   if (flashMessages.length > 0) {
       const [category, message] = flashMessages[0];
   
       const Toast = Swal.mixin({
           toast: true,
           position: 'top-end',
           showConfirmButton: false,
           timer: 3000,
           timerProgressBar: true,
           background: '#fff',
           color: '#333',
           didOpen: (toast) => {
               toast.addEventListener('mouseenter', Swal.stopTimer)
               toast.addEventListener('mouseleave', Swal.resumeTimer)
           }
       });
   
       Toast.fire({
           icon: category === "success" ? "success" : "info",
           title: message
       });
   }
</script>
