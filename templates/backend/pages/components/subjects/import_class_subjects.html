{% extends 'backend/home/base.html' %}

{% block title %}Import Class Subjects | School Management{% endblock %}

{% block content %}
<div class="page-header">
    <div class="page-header-left d-flex align-items-center">
        <div class="page-header-title">
            <h5>Import Class-Subject Assignments</h5>
        </div>
        <ul class="breadcrumb">
            <li class="breadcrumb-item"><a href="{{ url_for('main.dashboard') }}">Home</a></li>
            <li class="breadcrumb-item">Import Assignments</li>
        </ul>
    </div>
</div>

<div class="main-content">
    <div class="row">
        <div class="col-lg-6">
            <form method="POST" enctype="multipart/form-data">
                <div class="card">
                    <div class="card-header"><h5>Upload CSV</h5></div>
                    <div class="card-body">
                        <input type="file" name="file" class="form-control" accept=".csv" required>
                        <small class="text-muted">CSV columns: Class Name, Subject Name, School, Branch, Created At</small>
                    </div>
                    <div class="card-footer text-end">
                        <button type="submit" class="btn btn-primary">Import CSV</button>
                        <a href="{{ url_for('main.all_class_subjects') }}" class="btn btn-secondary ms-2">Cancel</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
