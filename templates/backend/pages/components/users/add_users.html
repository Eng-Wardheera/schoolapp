    <div class="col-md-6">
        <div class="form-group">
            <label for="school">School</label>
            <select id="school" name="school_id" class="form-control">
                <option value="" disabled selected>Select School</option>
                {% for school in schools %}
                    <option value="{{ school.id }}" data-has-branches="{{ '1' if school.branches|length > 0 else '0' }}">
                        {{ school.name }}
                    </option>
                {% endfor %}
            </select>
        </div>
    </div>

    <!-- Branch -->
    <div class="col-md-6" id="branch-container" style="display:none;">
        <div class="form-group">
            <label for="branch">Branch</label>
            <select class="form-control" id="branch-dropdown" name="branch_id">
                <option value="" disabled selected>Select Branch</option>
                {% for branch in branches %}
                    <option value="{{ branch.id }}" data-school-id="{{ branch.school_id }}">{{ branch.name }}</option>
                {% endfor %}
            </select>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const schoolSelect = document.getElementById('school');
    const branchContainer = document.getElementById('branch-container');
    const branchDropdown = document.getElementById('branch-dropdown');

    function updateBranches() {
        const selectedOption = schoolSelect.options[schoolSelect.selectedIndex];
        const hasBranches = selectedOption.dataset.hasBranches === '1';
        const schoolId = selectedOption.value;

        if (hasBranches) {
            branchContainer.style.display = 'block'; // show label + select

            // Filter branches by school
            Array.from(branchDropdown.options).forEach(option => {
                if (option.dataset.schoolId === schoolId || option.value === "") {
                    option.style.display = 'block';
                } else {
                    option.style.display = 'none';
                }
            });
        } else {
            branchContainer.style.display = 'none'; // hide label + select
        }
    }

    schoolSelect.addEventListener('change', updateBranches);

    // Optional: hide branch container on page load
    branchContainer.style.display = 'none';
});
</script>

<script>
function formatFlag (state) {
    if (!state.id) return state.text;
    var flagUrl = $(state.element).data('flag');
    if(flagUrl){
        var $state = $(
            '<span><img src="' + flagUrl + '" style="height:14px; margin-right:5px;" /> ' + state.text + '</span>'
        );
        return $state;
    }
    return state.text;
}

$(document).ready(function() {
    $('.select2-flag').select2({
        templateResult: formatFlag,
        templateSelection: formatFlag,
        minimumResultsForSearch: Infinity
    });
});
</script>

<!-- Password Validation -->
<script>
function togglePassword(fieldId, iconContainer) {
  const input = document.getElementById(fieldId);
  const icon = iconContainer.querySelector('i');

  if (input.type === "password") {
    input.type = "text";
    icon.classList.remove('fa-eye');
    icon.classList.add('fa-eye-slash');
  } else {
    input.type = "password";
    icon.classList.remove('fa-eye-slash');
    icon.classList.add('fa-eye');
  }
}

function validatePassword() {
  const password = document.getElementById("new_password").value;
  const confirmPassword = document.getElementById("confirm_password").value;
  const requirementsContainer = document.getElementById("passwordRequirements");

  const requirements = [
    { regex: /.{8,}/, message: "At least 8 characters" },
    { regex: /[A-Z]/, message: "At least one uppercase letter" },
    { regex: /[a-z]/, message: "At least one lowercase letter" },
    { regex: /[0-9]/, message: "At least one number" },
    { regex: /[!@#$%^&*(),.?\":{}|<>]/, message: "At least one special character" }
  ];

  if (password.length === 0) {
    // Hide requirements list if password is empty
    requirementsContainer.style.display = 'none';
  } else {
    // Check if all requirements met
    const allPassed = requirements.every(req => req.regex.test(password));

    if (allPassed) {
      // Show strong password message
      requirementsContainer.style.display = 'block';
      requirementsContainer.innerHTML = `<li style="color: green; font-weight: bold;">✅ Strong Password</li>`;
    } else {
      // Show list with individual checks
      requirementsContainer.style.display = 'block';

      const listItems = requirements.map(req => {
        const passed = req.regex.test(password);
        return `<li style="color:${passed ? 'green' : 'red'};">${passed ? '✅ ' : '❌ '}${req.message}</li>`;
      });
      requirementsContainer.innerHTML = listItems.join("");
    }
  }

  const feedback = document.getElementById("confirmFeedback");
  if (confirmPassword && password !== confirmPassword) {
    feedback.textContent = "Passwords do not match";
    feedback.classList.add("text-danger");
    feedback.classList.remove("text-success");
  } else if (confirmPassword) {
    feedback.textContent = "Passwords match";
    feedback.classList.add("text-success");
    feedback.classList.remove("text-danger");
  } else {
    feedback.textContent = "";
  }

  return requirements.every(req => req.regex.test(password)) && password === confirmPassword;
}

document.querySelector("form").addEventListener("submit", function (e) {
  if (!validatePassword()) {
    e.preventDefault();
    Swal.fire({
      icon: "error",
      title: "Invalid Password",
      text: "Please fix password errors before submitting."
    });
  }
});
</script>

<!-- somalia_regions -->
<script>
// somaliaRegions waa dictionary Python Flask ka soo diray sida JSON
  const somaliaRegions = {{ somalia_regions | tojson }};

  const countryInput = document.getElementById('country');
  const stateDropdown = document.getElementById('state-dropdown');
  const stateText = document.getElementById('state-text');
  const cityDropdown = document.getElementById('city-dropdown');
  const cityText = document.getElementById('city-text');

  countryInput.addEventListener('input', function () {
    const country = this.value.trim().toLowerCase();

    if (country === 'somalia') {
      // Show dropdowns for region and city, hide text inputs
      stateDropdown.style.display = 'block';
      stateDropdown.disabled = false;
      stateDropdown.value = "";
      stateDropdown.setAttribute('name', 'state');

      cityDropdown.style.display = 'none';
      cityDropdown.innerHTML = '';
      cityDropdown.removeAttribute('name');

      stateText.style.display = 'none';
      stateText.value = '';
      stateText.removeAttribute('name');

      cityText.style.display = 'none';
      cityText.value = '';
      cityText.removeAttribute('name');
    } else {
      // Show text inputs for region and city, hide dropdowns
      stateText.style.display = 'block';
      stateText.setAttribute('name', 'state_text');

      cityText.style.display = 'block';
      cityText.setAttribute('name', 'city_text');

      stateDropdown.style.display = 'none';
      stateDropdown.value = '';
      stateDropdown.removeAttribute('name');

      cityDropdown.style.display = 'none';
      cityDropdown.innerHTML = '';
      cityDropdown.removeAttribute('name');
    }
  });

  stateDropdown.addEventListener('change', function () {
    const selectedRegion = this.value;
    const cities = somaliaRegions[selectedRegion] || [];

    cityDropdown.innerHTML = '';
    cityDropdown.style.display = 'block';
    cityDropdown.disabled = false;
    cityDropdown.setAttribute('name', 'city');

    cityText.style.display = 'none';
    cityText.value = '';
    cityText.removeAttribute('name');

    // Add default option
    const defaultOption = document.createElement('option');
    defaultOption.text = 'Select City';
    defaultOption.disabled = true;
    defaultOption.selected = true;
    cityDropdown.appendChild(defaultOption);

    // Add cities dynamically
    cities.forEach(function(city) {
      const option = document.createElement('option');
      option.value = city;
      option.text = city;
      cityDropdown.appendChild(option);
    });

    // Add "Other" option for manual city input
    const otherOption = document.createElement('option');
    otherOption.value = 'Other';
    otherOption.text = 'Other';
    cityDropdown.appendChild(otherOption);
  });

  cityDropdown.addEventListener('change', function () {
    if (this.value === 'Other') {
      cityText.style.display = 'block';
      cityText.setAttribute('name', 'city_text');
      cityDropdown.removeAttribute('name');
    } else {
      cityText.style.display = 'none';
      cityText.value = '';
      cityText.removeAttribute('name');
      cityDropdown.setAttribute('name', 'city');
    }
  });
</script>

<!-- phone number and country code Validation -->
<script>
  const countrySelect = document.getElementById("country");
  const phoneInput = document.getElementById("phone");
  const countryCodeSpan = document.getElementById("country-code");

  countrySelect.addEventListener("change", () => {
    const selectedOption = countrySelect.options[countrySelect.selectedIndex];
    const phoneCode = selectedOption.getAttribute("data-phone-code");
    const minLength = parseInt(selectedOption.getAttribute("data-min-length"));
    const maxLength = parseInt(selectedOption.getAttribute("data-max-length"));

    phoneInput.addEventListener("input", function () {
        // Tirooyin keliya ayaa la oggol yahay
        this.value = this.value.replace(/\D/g, "");
    });

    // Nadiifi phone number markasta oo waddanka la beddelo
    phoneInput.value = "";

    // Show country code
    countryCodeSpan.textContent = phoneCode ? `+${phoneCode}` : "+XXX";

    if (!isNaN(minLength) && !isNaN(maxLength)) {
      phoneInput.disabled = false;
      phoneInput.setAttribute("minlength", minLength);
      phoneInput.setAttribute("maxlength", maxLength);
      phoneInput.setAttribute("pattern", `\\d{${minLength},${maxLength}}`);
      phoneInput.setAttribute("placeholder", `Enter ${minLength}-${maxLength} digits`);
    } else {
      phoneInput.disabled = false;
      phoneInput.removeAttribute("minlength");
      phoneInput.removeAttribute("maxlength");
      phoneInput.removeAttribute("pattern");
      phoneInput.setAttribute("placeholder", "Enter phone number");
    }
  });

  // Initial: Disable phone input until country is selected
  phoneInput.disabled = true;
</script>
